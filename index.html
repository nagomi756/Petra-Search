<!DOCTYPE html>
<html lang="ja" data-theme="purple">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ペトラナイトメア - 字幕横断検索システム (Web公開版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* --- テーマ定義 (CSS変数) --- */
    :root, [data-theme="purple"] {
      --bg-main: #0b0713;
      --bg-card: #150e26;
      --bg-header: #120a21;
      --bg-inner: #0d0718;
      --bg-accent: #4c1d95;
      --bg-accent-hover: #6d28d9;
      --text-main: #f3f1f6;
      --text-muted: #a78bfa;
      --text-accent: #c084fc;
      --border-color: rgba(139, 92, 246, 0.25);
      --highlight-bg: rgba(234, 179, 8, 0.3);
      --highlight-text: #fef08a;
      --shadow-color: rgba(76, 29, 149, 0.2);
    }

    [data-theme="white"] {
      --bg-main: #f8fafc;
      --bg-card: #ffffff;
      --bg-header: #e2e8f0;
      --bg-inner: #f1f5f9;
      --bg-accent: #6d28d9;
      --bg-accent-hover: #5b21b6;
      --text-main: #0f172a;
      --text-muted: #475569;
      --text-accent: #7c3aed;
      --border-color: rgba(109, 40, 217, 0.15);
      --highlight-bg: rgba(234, 179, 8, 0.25);
      --highlight-text: #854d0e;
      --shadow-color: rgba(0, 0, 0, 0.05);
    }

    [data-theme="black"] {
      --bg-main: #000000;
      --bg-card: #0f0f0f;
      --bg-header: #141414;
      --bg-inner: #070707;
      --bg-accent: #262626;
      --bg-accent-hover: #404040;
      --text-main: #ffffff;
      --text-muted: #a3a3a3;
      --text-accent: #e5e5e5;
      --border-color: rgba(255, 255, 255, 0.1);
      --highlight-bg: rgba(234, 179, 8, 0.4);
      --highlight-text: #fef08a;
      --shadow-color: rgba(0, 0, 0, 0.8);
    }

    [data-theme="pink"] {
      --bg-main: #0d0408;
      --bg-card: #200814;
      --bg-header: #17050e;
      --bg-inner: #12030b;
      --bg-accent: #be185d;
      --bg-accent-hover: #db2777;
      --text-main: #fdf2f8;
      --text-muted: #f472b6;
      --text-accent: #fbcfe8;
      --border-color: rgba(219, 39, 119, 0.25);
      --highlight-bg: rgba(245, 158, 11, 0.35);
      --highlight-text: #fde68a;
      --shadow-color: rgba(190, 24, 93, 0.25);
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-inner); }
    ::-webkit-scrollbar-thumb { background: var(--bg-accent); border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="border-b border-[var(--border-color)] bg-[var(--bg-header)]/90 backdrop-blur sticky top-0 z-50 px-4 py-3 transition-colors duration-200">
    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-800 to-indigo-900 border border-purple-500/50 flex items-center justify-center font-bold text-purple-200">P</div>
        <div>
          <h1 class="text-lg font-bold tracking-wider text-[var(--text-accent)] flex items-center gap-2">
            ペトラナイトメア -Petra Nightmare-
            <span class="text-xs bg-[var(--bg-inner)] text-[var(--text-muted)] px-2 py-0.5 rounded-full border border-[var(--border-color)]">Web公開版</span>
          </h1>
          <p class="text-xs text-[var(--text-muted)]">ブラウザ単体で動作する軽量・高速な字幕検索システム</p>
        </div>
      </div>

      <div class="flex items-center gap-4 flex-wrap">
        <div class="bg-[var(--bg-inner)] p-1 rounded-xl border border-[var(--border-color)] flex items-center gap-1">
          <button onclick="changeTheme('purple')" class="w-6 h-6 rounded-lg bg-[#4c1d95] border border-purple-400/40 hover:scale-110 transition-all"></button>
          <button onclick="changeTheme('white')" class="w-6 h-6 rounded-lg bg-white border border-slate-300 hover:scale-110 transition-all"></button>
          <button onclick="changeTheme('black')" class="w-6 h-6 rounded-lg bg-black border border-neutral-700 hover:scale-110 transition-all"></button>
          <button onclick="changeTheme('pink')" class="w-6 h-6 rounded-lg bg-[#be185d] border border-pink-400/40 hover:scale-110 transition-all"></button>
        </div>
        <div id="connection-status" class="flex items-center gap-2 text-xs text-amber-400 font-bold">
          <span class="inline-block w-2.5 h-2.5 rounded-full bg-amber-500 animate-pulse"></span>
          データ読み込み中...
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-7xl w-full mx-auto p-4 flex flex-col lg:flex-row gap-6">
    <div class="flex-1 flex flex-col gap-4 lg:w-3/5">
      <div class="bg-[var(--bg-card)] p-5 rounded-2xl border border-[var(--border-color)] shadow-xl transition-all duration-200">
        <label for="search-input" class="block text-sm font-medium text-[var(--text-muted)] mb-2">発言内容から検索</label>
        <div class="relative flex gap-2">
          <input type="text" id="search-input" placeholder="「サキュバス」や「牛乳」など..." class="flex-1 bg-[var(--bg-inner)] border border-[var(--border-color)] rounded-xl py-3 pl-4 pr-12 text-[var(--text-main)] focus:outline-none focus:ring-2 focus:ring-[var(--text-accent)] transition-all">
          <button id="search-btn" class="px-6 py-3 bg-[var(--bg-accent)] hover:bg-[var(--bg-accent-hover)] text-white font-bold rounded-xl transition-all active:scale-95">検索</button>
        </div>
      </div>

      <div class="flex items-center justify-between px-2 text-xs text-[var(--text-muted)]">
        <div id="results-count">検索結果: 0 件</div>
        <div id="search-target-summary">JSONデータをロード中...</div>
      </div>

      <div id="results-container" class="space-y-4 overflow-y-auto max-h-[60vh] lg:max-h-[calc(100vh-320px)] pr-2">
        <div class="text-center py-12 bg-[var(--bg-card)]/30 border border-[var(--border-color)] rounded-2xl text-[var(--text-muted)]">
          データを読み込んでいます。少々お待ちください...
        </div>
      </div>
    </div>

    <div class="lg:w-2/5 flex flex-col gap-4">
      <div class="bg-[var(--bg-card)] rounded-2xl border border-[var(--border-color)] overflow-hidden shadow-2xl sticky top-24">
        <div class="p-4 bg-[var(--bg-header)] border-b border-[var(--border-color)] flex items-center justify-between">
          <h3 class="font-bold text-sm text-[var(--text-main)] flex items-center gap-2">
            <svg class="h-5 w-5 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.11C19.518 3.545 12 3.545 12 3.545s-7.518 0-9.388.507a3.003 3.003 0 0 0-2.11 2.11C0 8.033 0 12 0 12s0 3.967.502 5.837a3.003 3.003 0 0 0 2.11 2.11c1.87.507 9.388.507 9.388.507s7.518 0 9.388-.507a3.003 3.003 0 0 0 2.11-2.11C24 15.967 24 12 24 12s0-3.967-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            YouTube 連動
          </h3>
          <span id="player-status" class="text-xs bg-[var(--bg-inner)] text-[var(--text-muted)] px-2.5 py-0.5 rounded border border-[var(--border-color)] font-bold">API準備中</span>
        </div>
        <div class="relative w-full aspect-video bg-black"><div id="youtube-player" class="absolute inset-0 w-full h-full"></div></div>
        <div class="p-4 bg-[var(--bg-inner)]">
          <h4 id="current-video-title" class="font-bold text-sm text-[var(--text-main)] line-clamp-2">動画を選択してください</h4>
          <div class="mt-4 pt-3 border-t border-[var(--border-color)] flex items-center justify-between">
            <span id="video-id-badge" class="text-xs text-[var(--text-muted)] font-mono">Video ID: ---</span>
            <a id="external-link" href="#" target="_blank" class="text-xs text-[var(--text-accent)] hover:text-[var(--text-main)] flex items-center gap-1 transition">YouTubeで直接開く</a>
          </div>
        </div>
      </div>
    </div>
  </main>

<script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let fileList = []; // data/file_list.json の中身を保持
    const statusBadge = document.getElementById('connection-status');
    const targetSummary = document.getElementById('search-target-summary');
    const resultsContainer = document.getElementById('results-container');
    const resultsCount = document.getElementById('results-count');
    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');

    function changeTheme(themeName) {
      document.documentElement.setAttribute('data-theme', themeName);
      localStorage.setItem('selected-theme', themeName);
    }
    const savedTheme = localStorage.getItem('selected-theme') || 'purple';
    changeTheme(savedTheme);

    // --- 【変更点1】初期化: JSONファイルの一覧を取得 ---
    async function initSystem() {
      try {
        // data/file_list.json を読み込む
        const response = await fetch('data/file_list.json');
        if (!response.ok) throw new Error('File list not found');
        fileList = await response.json();
        
        statusBadge.textContent = "検索準備完了";
        statusBadge.className = "flex items-center gap-2 text-xs text-emerald-400 font-bold";
        targetSummary.textContent = `${fileList.length} ヶ月分のデータを対象にします`;
        renderEmptyState();
      } catch (err) {
        console.error("Initialization failed:", err);
        statusBadge.textContent = "初期化失敗";
        statusBadge.className = "flex items-center gap-2 text-xs text-red-500 font-bold";
        targetSummary.innerHTML = `<span class="text-red-400">data/file_list.json が見つかりません。</span>`;
      }
    }
    window.addEventListener('DOMContentLoaded', initSystem);

    // --- 【変更点2】検索ロジック: ファイルを1つずつ読み込んで逐次検索 ---
    async function triggerSearch() {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) {
        renderEmptyState();
        return;
      }

      searchBtn.textContent = "検索中...";
      searchBtn.disabled = true;
      resultsContainer.innerHTML = ""; // 画面をクリア
      let totalMatches = 0;

      // 月ごとのファイルを順番に処理
      for (const filePath of fileList) {
        try {
          targetSummary.textContent = `${filePath.replace('data/', '')} を検索中...`;
          
          const res = await fetch(filePath);
          const monthData = await res.json();
          
          const matches = [];
          monthData.forEach((item, index) => {
            if (item.txt.toLowerCase().includes(query)) {
              matches.push({
                before: (index > 0) ? monthData[index-1] : null,
                current: item,
                after: (index < monthData.length - 1) ? monthData[index+1] : null
              });
            }
          });

          if (matches.length > 0) {
            totalMatches += matches.length;
            renderBatchResults(matches, query); // 見つかったものをすぐ画面に追加
            resultsCount.textContent = `検索結果: ${totalMatches} 件`;
          }
        } catch (e) {
          console.error(`Error searching ${filePath}:`, e);
        }
      }

      targetSummary.textContent = `検索完了（対象: ${fileList.length} ファイル）`;
      searchBtn.textContent = "検索";
      searchBtn.disabled = false;

      if (totalMatches === 0) {
        resultsContainer.innerHTML = `<div class="text-center py-12 bg-[var(--bg-card)]/30 border border-[var(--border-color)] rounded-2xl"><p class="text-[var(--text-muted)]">「${query}」に一致する発言はありませんでした。</p></div>`;
      }
    }

    // 検索結果を画面に追加していく関数
    function renderBatchResults(matches, query) {
      let html = '';
      matches.forEach(match => {
        const { before, current, after } = match;
        const timeStr = formatTime(current.sec);
        html += `
          <div class="bg-[var(--bg-card)] border border-[var(--border-color)] rounded-2xl p-4 hover:border-[var(--text-accent)]/50 transition-all shadow-lg group">
            <div class="flex items-center justify-between gap-3 mb-3 pb-2 border-b border-[var(--border-color)]/50">
              <div class="flex items-center gap-3 min-w-0">
                <div class="w-16 h-10 bg-black rounded overflow-hidden border border-[var(--border-color)]">
                  <img src="https://i.ytimg.com/vi/${current.id}/hqdefault.jpg" class="w-full h-full object-cover" loading="lazy">
                </div>
                <div class="min-w-0 flex-1">
                  <p class="text-xs text-[var(--text-main)] font-bold truncate">${current.ttl}</p>
                  <p class="text-[10px] text-[var(--text-muted)] mt-0.5">📅 ${formatDate(current.dt)}</p>
                </div>
              </div>
              <button onclick="seekAndPlay('${current.id}', ${current.sec})" class="bg-[var(--bg-accent)] hover:bg-[var(--bg-accent-hover)] text-white text-xs px-3 py-1.5 rounded-lg font-bold shadow-md active:scale-95 transition-all flex items-center gap-1 shrink-0">
                再生
              </button>
            </div>
            <div class="space-y-2 text-sm">
              ${before ? `<div class="flex items-start gap-2 text-[var(--text-muted)]/50 text-xs"><span class="font-mono text-[10px] bg-[var(--bg-inner)] px-1 py-0.5 rounded">${formatTime(before.sec)}</span><p class="flex-1 line-clamp-1">${before.txt}</p></div>` : ''}
              <div class="flex items-start gap-2 bg-[var(--bg-inner)] p-2.5 rounded-xl border border-[var(--border-color)]">
                <span class="font-mono text-xs bg-[var(--bg-accent)] text-white px-1.5 py-0.5 rounded-md">${timeStr}</span>
                <p class="flex-1 text-[var(--text-main)] font-medium leading-relaxed">${highlightText(current.txt, query)}</p>
              </div>
              ${after ? `<div class="flex items-start gap-2 text-[var(--text-muted)]/50 text-xs"><span class="font-mono text-[10px] bg-[var(--bg-inner)] px-1 py-0.5 rounded">${formatTime(after.sec)}</span><p class="flex-1 line-clamp-1">${after.txt}</p></div>` : ''}
            </div>
          </div>`;
      });
      resultsContainer.insertAdjacentHTML('beforeend', html);
    }

// --- YouTube API 連動設定 ---
    let ytPlayer = null;
    let isPlayerReady = false;

    // 初期表示用の動画ID (例: 最新の配信や代表的な動画IDを入れておく)
    const DEFAULT_VIDEO_ID = "Oz_WA5PcLRE"; 

    function onYouTubeIframeAPIReady() {
      ytPlayer = new YT.Player('youtube-player', {
        videoId: DEFAULT_VIDEO_ID, // 起動時に表示する動画を指定
        playerVars: {
          'playsinline': 1,
          'rel': 0
        },
        events: {
          'onReady': (event) => {
            isPlayerReady = true;
            document.getElementById('player-status').textContent = "連動可能";
            document.getElementById('player-status').className = "text-xs bg-emerald-950 text-emerald-300 border border-emerald-700/50 px-2.5 py-0.5 rounded font-bold";
            
            // 初期状態の情報を表示
            document.getElementById('video-id-badge').textContent = `Video ID: ${DEFAULT_VIDEO_ID}`;
          },
          'onError': (e) => {
            console.error("YouTube Player Error:", e);
            document.getElementById('player-status').textContent = "エラー";
            document.getElementById('player-status').className = "text-xs bg-red-950 text-red-300 border border-red-700/50 px-2.5 py-0.5 rounded font-bold";
          }
        }
      });
    }

    function seekAndPlay(videoId, seconds) {
      if (!isPlayerReady) {
        console.warn("Player is not ready yet.");
        return;
      }
      
      // 動画を読み込んで指定時間から再生
      ytPlayer.loadVideoById({
        videoId: videoId,
        startSeconds: seconds
      });
      
      document.getElementById('current-video-title').textContent = "動画を再生中...";
      document.getElementById('video-id-badge').textContent = `Video ID: ${videoId}`;
      document.getElementById('external-link').href = `https://www.youtube.com/watch?v=${videoId}&t=${seconds}s`;
    }
  </script>
</body>
</html>
</body>
</html>
